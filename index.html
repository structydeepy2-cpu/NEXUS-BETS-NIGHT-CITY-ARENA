<!DOCTYPE html>
<html lang="en" data-theme="cyberpunk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS BETS • NIGHT CITY ARENA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(to bottom, #0a0a0a, #1a0033);
      font-family: 'Courier New', monospace;
      color: #00ffff;
    }
    .neon-pink { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
    .neon-cyan { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
    .glitch {
      position: relative;
      animation: glitch 1s infinite;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    .scanline {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,255,255,0.03) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
      animation: scan 4s linear infinite;
    }
    @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  </style>
</head>
<body class="min-h-screen overflow-hidden relative">
  <div class="scanline"></div>
  
  <!-- Header -->
  <header class="border-b border-cyan-500 bg-black/80 backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-cyan-500 rounded-full flex items-center justify-center text-black font-bold text-2xl glitch">N</div>
        <h1 class="text-3xl font-bold neon-pink tracking-widest">NEXUS BETS</h1>
      </div>
      <nav class="flex gap-8 text-lg">
        <a href="#" class="hover:text-pink-400 transition">MATCHES</a>
        <a href="#" class="hover:text-pink-400 transition">LIVE</a>
        <a href="#" class="hover:text-pink-400 transition">MY BETS</a>
        <a href="#" class="hover:text-pink-400 transition">WALLET</a>
      </nav>
      <div class="flex items-center gap-4">
        <div class="bg-zinc-900 px-4 py-2 rounded border border-cyan-500">💰 1247.50 NC</div>
        <button onclick="connectWallet()" class="px-6 py-2 bg-pink-600 hover:bg-pink-500 rounded font-bold neon-pink">CONNECT JACK</button>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-12 gap-6">
    <!-- Main Matches -->
    <div class="col-span-8">
      <h2 class="text-4xl mb-6 neon-cyan glitch">UPCOMING RUNS</h2>
      
      <!-- Example Match Card -->
      <div class="bg-zinc-900/70 border border-pink-500 rounded-xl p-6 mb-6 hover:border-cyan-400 transition-all group">
        <div class="flex justify-between items-start">
          <div>
            <div class="text-sm text-pink-400">THE FINALS • QUICK CASHOUT</div>
            <div class="text-2xl font-bold">Team Neon vs Chrome Reapers</div>
          </div>
          <div class="text-right">
            <div class="text-xs">STARTS IN</div>
            <div class="text-3xl font-mono neon-pink">47m</div>
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-6 mt-8">
          <button onclick="placeBet(this)" class="bet-btn bg-gradient-to-r from-cyan-500 to-blue-600 p-6 rounded-xl text-left hover:scale-105 transition">
            <div class="text-xl">TEAM NEON</div>
            <div class="text-4xl font-bold">1.85</div>
            <div class="text-xs opacity-75">x2.0 potential</div>
          </button>
          
          <button onclick="placeBet(this)" class="bet-btn bg-gradient-to-r from-pink-500 to-purple-600 p-6 rounded-xl text-left hover:scale-105 transition">
            <div class="text-xl">CHROME REAPERS</div>
            <div class="text-4xl font-bold">2.45</div>
            <div class="text-xs opacity-75">x2.0 potential</div>
          </button>
        </div>
      </div>

      <!-- Add more cards for Battlefield etc. similarly -->
    </div>

    <!-- Betting Slip -->
    <div class="col-span-4">
      <div class="bg-zinc-900 border border-cyan-500 rounded-2xl p-6 sticky top-24">
        <h3 class="text-2xl neon-pink mb-4">BET SLIP</h3>
        <div id="slip" class="min-h-[300px] text-sm"></div>
        <div class="mt-6 pt-6 border-t border-zinc-700">
          <div class="flex justify-between text-lg"><span>Total Stake</span><span class="font-mono" id="total-stake">0 NC</span></div>
          <button onclick="submitBet()" class="w-full mt-4 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 text-black font-bold text-xl rounded-xl hover:brightness-110">PLACE BET • RUN THE NET</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Simple JS for interactivity
    let slip = [];
    function placeBet(el) {
      const match = el.closest('.bg-zinc-900');
      const team = el.querySelector('.text-xl').textContent;
      const odds = el.querySelector('.text-4xl').textContent;
      
      slip.push({team, odds});
      renderSlip();
      el.classList.add('!border-green-400');
    }
    
    function renderSlip() {
      const container = document.getElementById('slip');
      container.innerHTML = slip.map((item, i) => `
        <div class="flex justify-between py-3 border-b border-zinc-700">
          <span>${item.team}</span>
          <span class="text-cyan-400">${item.odds}</span>
        </div>
      `).join('');
      document.getElementById('total-stake').textContent = `${slip.length * 50} NC`;
    }
    
    function submitBet() {
      if (slip.length === 0) return alert("No bets selected, choom.");
      alert("Bet placed in the shadows. Good luck, runner.");
      slip = [];
      renderSlip();
    }
    
    function connectWallet() {
      alert("Jacked in! (Demo wallet connected)");
    }
  </script>
</body>
</html>
