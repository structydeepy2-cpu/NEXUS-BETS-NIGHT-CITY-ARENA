<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS BETS • NIGHT CITY ARENA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:'Courier New', monospace; }
    canvas { position:fixed; top:0; left:0; z-index:1; }
    .ui-overlay { position:relative; z-index:10; pointer-events:none; }
    .ui-overlay > * { pointer-events:auto; }
    .neon-pink { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
    .neon-cyan { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
    .glitch { animation: glitch 0.8s infinite; }
    @keyframes glitch { 0%{transform:translate(0)}20%{transform:translate(-3px,3px)}40%{transform:translate(-3px,-3px)}60%{transform:translate(3px,3px)}80%{transform:translate(3px,-3px)}100%{transform:translate(0)} }
    .scanline { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(to bottom,transparent 50%,rgba(0,255,255,0.05)50%); background-size:100% 6px; pointer-events:none; z-index:20; animation:scan 3s linear infinite; }
    @keyframes scan { 0%{transform:translateY(-100%)}100%{transform:translateY(100%)} }
    #mobile-menu { transform:translateY(-100%); transition:transform .4s cubic-bezier(0.4,0,0.2,1); }
    #mobile-menu.open { transform:translateY(0); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="scanline"></div>

  <div class="ui-overlay min-h-screen relative">
    <header class="border-b border-cyan-500 bg-black/90 backdrop-blur-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-gradient-to-br from-pink-500 to-cyan-500 rounded-full flex items-center justify-center text-black font-bold text-2xl glitch">N</div>
          <h1 class="text-2xl md:text-3xl font-bold neon-pink tracking-widest">NEXUS BETS</h1>
        </div>
        <nav class="hidden md:flex gap-8 text-lg">
          <a href="#" class="hover:text-pink-400 transition">MATCHES</a>
          <a href="#" class="hover:text-pink-400 transition">LIVE</a>
          <a href="#" class="hover:text-pink-400 transition">MY BETS</a>
          <a href="#" class="hover:text-pink-400 transition">WALLET</a>
        </nav>
        <div class="flex items-center gap-3">
          <div class="hidden sm:block bg-zinc-900 px-4 py-2 rounded border border-cyan-500 text-sm font-mono">💰 1247.50 NC</div>
          <button onclick="connectWallet()" class="px-5 py-2 bg-pink-600 hover:bg-pink-500 rounded font-bold neon-pink">CONNECT JACK</button>
          <button id="hamburger" class="md:hidden text-3xl p-2 text-cyan-400 hover:text-pink-400"><i class="fas fa-bars"></i></button>
        </div>
      </div>

      <div id="mobile-menu" class="hidden md:hidden bg-black/95 border-t border-cyan-500 absolute w-full left-0 z-50">
        <div class="flex flex-col px-6 py-8 gap-6 text-xl">
          <a href="#" class="hover:text-pink-400 py-2 border-b border-zinc-700">MATCHES</a>
          <a href="#" class="hover:text-pink-400 py-2 border-b border-zinc-700">LIVE</a>
          <a href="#" class="hover:text-pink-400 py-2 border-b border-zinc-700">MY BETS</a>
          <a href="#" class="hover:text-pink-400 py-2 border-b border-zinc-700">WALLET</a>
          <div class="pt-6 border-t border-cyan-500 text-sm flex items-center gap-3">
            <span class="text-cyan-400">BALANCE:</span> <span class="font-mono">💰 1247.50 NC</span>
          </div>
        </div>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-8 relative z-10">
      <h2 class="text-4xl mb-8 neon-cyan glitch text-center">UPCOMING RUNS</h2>
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div id="matches-container" class="lg:col-span-8 space-y-6"></div>
        <div class="lg:col-span-4">
          <div class="bg-zinc-900/90 border border-cyan-500 rounded-2xl p-6 sticky top-6">
            <h3 class="text-2xl neon-pink mb-4">BET SLIP</h3>
            <div id="slip" class="min-h-[280px] text-sm"></div>
            <div class="mt-6 pt-6 border-t border-zinc-700">
              <div class="flex justify-between text-lg"><span>Total Stake</span><span id="total-stake" class="font-mono">0 NC</span></div>
              <button onclick="submitBet()" class="w-full mt-4 py-4 bg-gradient-to-r from-pink-500 to-cyan-500 text-black font-bold rounded-xl">PLACE BET • RUN THE NET</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let scene, camera, renderer, composer, bloomPass, clock;
    let cards = [], rainParticles, sparkParticles;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let slip = [];

    function initThree() {
      clock = new THREE.Clock();
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 18);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      scene.fog = new THREE.Fog(0x0a001a, 10, 60);

      const ambient = new THREE.AmbientLight(0x00ffff, 0.6);
      scene.add(ambient);
      const pinkLight = new THREE.PointLight(0xff00ff, 3, 50);
      pinkLight.position.set(10, 15, 10);
      scene.add(pinkLight);

      const grid = new THREE.GridHelper(60, 40, 0x00ffff, 0xff00ff);
      grid.position.y = -2; grid.material.opacity = 0.2; grid.material.transparent = true;
      scene.add(grid);

      createHolographicCards();
      createNeonRain();
      createHolographicSparks();
      initPostProcessing();

      window.addEventListener('resize', onResize);
      window.addEventListener('click', onClick);
      animate();
    }

    function createHolographicCards() {
      const matches = [
        { title: "TEAM NEON vs CHROME REAPERS", game: "THE FINALS", odds1: "1.85", odds2: "2.45", pos: [-6, 3, 0] },
        { title: "US FORCES vs PACIFIC ALLIANCE", game: "BATTLEFIELD 2042", odds1: "1.65", odds2: "2.10", pos: [6, 3, -4] },
        { title: "SHADOW RUNNERS vs VOID REBELS", game: "THE FINALS", odds1: "2.10", odds2: "1.75", pos: [0, 6, 8] }
      ];

      matches.forEach(m => {
        const geometry = new THREE.PlaneGeometry(5, 3.2);
        const material = new THREE.ShaderMaterial({
          uniforms: { time: { value: 0 } },
          vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
          fragmentShader: `
            uniform float time; varying vec2 vUv;
            float hash(vec2 p){ return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453); }
            float noise(vec2 p){
              vec2 i=floor(p), f=fract(p); f=f*f*(3.-2.*f);
              float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));
              return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
            }
            float fbm(vec2 p){
              float v=0., a=0.5; float freq=1.;
              for(int i=0;i<6;i++){ v+=a*noise(p*freq); a*=0.5; freq*=2.; }
              return v;
            }
            void main(){
              vec2 uv=vUv; float turb=fbm(uv*6.+time*1.2); uv+=turb*0.045;
              vec3 neon=mix(vec3(0.,1.,1.),vec3(1.,0.,0.8),sin(time+turb*5.)*0.5+0.5);
              float scan=sin(uv.y*90.+time*25.)*0.07+0.93;
              float edge=(1.-smoothstep(0.,0.12,min(uv.x,1.-uv.x)))*(1.-smoothstep(0.,0.12,min(uv.y,1.-uv.y)))*2.5;
              vec3 color=neon*(scan+edge+turb*0.6);
              gl_FragColor=vec4(color,0.96);
            }
          `,
          side: THREE.DoubleSide, transparent: true, depthWrite: false
        });

        const card = new THREE.Mesh(geometry, material);
        card.userData = m; card.rotation.x = -0.3; card.position.set(...m.pos);
        scene.add(card); cards.push(card);
      });
    }

    function createNeonRain() {
      const count = 8000;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const speeds = new Float32Array(count);
      for (let i = 0; i < count; i++) {
        positions[i*3] = Math.random()*80-40;
        positions[i*3+1] = Math.random()*60-10;
        positions[i*3+2] = Math.random()*40-20;
        const hue = Math.random()>0.5?0.8:0.55;
        colors[i*3]=hue; colors[i*3+1]=0.9; colors[i*3+2]=1.;
        speeds[i] = 0.8 + Math.random()*1.8;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      rainParticles = new THREE.Points(geometry, new THREE.PointsMaterial({
        size:0.12, vertexColors:true, transparent:true, opacity:0.7, blending:THREE.AdditiveBlending, depthTest:false
      }));
      scene.add(rainParticles); rainParticles.userData = {speeds};
    }

    function createHolographicSparks() {
      const count = 1200;
      const positions = new Float32Array(count*3);
      const colors = new Float32Array(count*3);
      for(let i=0;i<count;i++){
        positions[i*3]=(Math.random()-0.5)*40;
        positions[i*3+1]=Math.random()*20;
        positions[i*3+2]=(Math.random()-0.5)*30;
        const c = Math.random()>0.5?new THREE.Color(0xff00ff):new THREE.Color(0x00ffff);
        colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors,3));
      sparkParticles = new THREE.Points(geometry, new THREE.PointsMaterial({
        size:0.08, vertexColors:true, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending
      }));
      scene.add(sparkParticles);
    }

    function initPostProcessing() {
      composer = new THREE.EffectComposer(renderer);
      composer.addPass(new THREE.RenderPass(scene, camera));

      bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.8,   // strength (tune this!)
        0.6,   // radius
        0.15   // threshold
      );
      composer.addPass(bloomPass);
    }

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const delta = clock.getDelta();

      cards.forEach(card => {
        card.material.uniforms.time.value = t;
        card.rotation.y = Math.sin(t * 0.5 + card.position.x) * 0.08;
      });

      if (rainParticles) {
        const pos = rainParticles.geometry.attributes.position.array;
        const speeds = rainParticles.userData.speeds;
        for (let i = 0; i < pos.length / 3; i++) {
          pos[i*3 + 1] -= speeds[i] * delta * 25;
          if (pos[i*3 + 1] < -15) pos[i*3 + 1] = 50;
        }
        rainParticles.geometry.attributes.position.needsUpdate = true;
      }

      if (sparkParticles) sparkParticles.rotation.y = t * 0.05;

      if (composer) composer.render();
      else renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (composer) composer.setSize(window.innerWidth, window.innerHeight);
    }

    function onClick(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(cards);
      if (intersects.length > 0) {
        const data = intersects[0].object.userData;
        placeBetFromCard(data);
      }
    }

    function placeBetFromCard(data) {
      slip.push({team: data.title.split(' vs ')[0], odds: data.odds1, matchTitle: data.title});
      slip.push({team: data.title.split(' vs ')[1], odds: data.odds2, matchTitle: data.title});
      renderSlip();
      alert(`Jacked into ${data.game}! Bet options added.`);
    }

    function renderSlip() {
      const container = document.getElementById('slip');
      if (slip.length === 0) {
        container.innerHTML = `<p class="text-zinc-500 text-center py-8">Click glowing cards to bet...</p>`;
        document.getElementById('total-stake').textContent = '0 NC';
        return;
      }
      container.innerHTML = slip.map(item => `
        <div class="flex justify-between py-3 border-b border-zinc-700">
          <div><span class="text-xs text-zinc-400">${item.matchTitle}</span><br>${item.team}</div>
          <span class="text-cyan-400 font-bold">${item.odds}</span>
        </div>
      `).join('');
      document.getElementById('total-stake').textContent = `${slip.length * 50} NC`;
    }

    function submitBet() {
      if (slip.length === 0) return alert("No bets selected, choom.");
      alert("Bet placed in the shadows. Good luck, runner.");
      slip = []; renderSlip();
    }

    function connectWallet() { alert("Jacked in — Wallet connected (demo)"); }

    function initMobileMenu() {
      const hamburger = document.getElementById('hamburger');
      const mobileMenu = document.getElementById('mobile-menu');
      const icon = hamburger.querySelector('i');
      hamburger.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
        setTimeout(() => mobileMenu.classList.toggle('open'), 10);
        icon.classList.toggle('fa-bars'); icon.classList.toggle('fa-times');
      });
      document.querySelectorAll('#mobile-menu a').forEach(link => {
        link.addEventListener('click', () => {
          mobileMenu.classList.add('hidden','open'); // close
          icon.classList.add('fa-bars'); icon.classList.remove('fa-times');
        });
      });
    }

    window.onload = () => {
      initThree();
      initMobileMenu();
      renderSlip();
    };
  </script>
</body>
</html>
