  <script>
    let scene, camera, renderer, composer, clock;
    let cards = [], rainParticles, sparkParticles;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let slip = [];

    function initThree() {
      clock = new THREE.Clock();
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 8, 18);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      scene.fog = new THREE.Fog(0x0a001a, 10, 60);

      const ambient = new THREE.AmbientLight(0x00ffff, 0.6);
      scene.add(ambient);
      const pinkLight = new THREE.PointLight(0xff00ff, 3, 50);
      pinkLight.position.set(10, 15, 10);
      scene.add(pinkLight);

      const grid = new THREE.GridHelper(60, 40, 0x00ffff, 0xff00ff);
      grid.position.y = -2; grid.material.opacity = 0.2; grid.material.transparent = true;
      scene.add(grid);

      createHolographicCards();
      createNeonRain();
      createHolographicSparks();
      initPostProcessing();

      window.addEventListener('resize', onResize);
      window.addEventListener('click', onClick);
      animate();
    }

    function createHolographicCards() {
      const matches = [
        { title: "TEAM NEON vs CHROME REAPERS", game: "THE FINALS", odds1: "1.85", odds2: "2.45", pos: [-6, 3, 0] },
        { title: "US FORCES vs PACIFIC ALLIANCE", game: "BATTLEFIELD 2042", odds1: "1.65", odds2: "2.10", pos: [6, 3, -4] },
        { title: "SHADOW RUNNERS vs VOID REBELS", game: "THE FINALS", odds1: "2.10", odds2: "1.75", pos: [0, 6, 8] }
      ];

      matches.forEach(m => {
        const geometry = new THREE.PlaneGeometry(5, 3.2);
        const material = new THREE.ShaderMaterial({
          uniforms: { time: { value: 0 } },
          vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
          fragmentShader: `
            uniform float time;
            varying vec2 vUv;

            // Hash
            float hash(vec2 p) {
              return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
            }

            // Simple value noise
            float noise(vec2 p) {
              vec2 i = floor(p);
              vec2 f = fract(p);
              f = f*f*(3.0-2.0*f);
              float a = hash(i);
              float b = hash(i + vec2(1.0,0.0));
              float c = hash(i + vec2(0.0,1.0));
              float d = hash(i + vec2(1.0,1.0));
              return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
            }

            // FRACTAL BROWNIAN MOTION (fBm)
            float fbm(vec2 p) {
              float value = 0.0;
              float amplitude = 0.5;
              float frequency = 1.0;
              int octaves = 6;
              for(int i = 0; i < 6; i++) {
                value += amplitude * noise(p * frequency);
                amplitude *= 0.5;
                frequency *= 2.0;
              }
              return value;
            }

            void main() {
              vec2 uv = vUv;

              // fBm distortion
              float turbulence = fbm(uv * 6.0 + time * 1.2);
              uv += turbulence * 0.045;

              // RGB glitch modulated by fBm
              float r = sin(uv.x * 25.0 + time * 6.0 + turbulence * 8.0) * 0.018;
              float g = sin(uv.y * 20.0 + time * 5.0) * 0.012;
              vec3 neon = mix(vec3(0.0,1.0,1.0), vec3(1.0,0.0,0.8), sin(time + turbulence * 5.0) * 0.5 + 0.5);

              // Scanlines + edge glow
              float scan = sin(uv.y * 90.0 + time * 25.0) * 0.07 + 0.93;
              float edge = (1.0 - smoothstep(0.0, 0.12, min(uv.x, 1.0-uv.x))) * 
                           (1.0 - smoothstep(0.0, 0.12, min(uv.y, 1.0-uv.y))) * 2.5;

              vec3 color = neon * (scan + edge + turbulence * 0.6);
              gl_FragColor = vec4(color, 0.96);
            }
          `,
          side: THREE.DoubleSide,
          transparent: true,
          depthWrite: false
        });

        const card = new THREE.Mesh(geometry, material);
        card.userData = m;
        card.rotation.x = -0.3;
        card.position.set(...m.pos);
        scene.add(card);
        cards.push(card);
      });
    }
